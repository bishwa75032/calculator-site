<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Smart Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px;
        }

        .calculator-container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: clamp(20px, 5vw, 40px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            padding: clamp(15px, 4vw, 25px);
        }

        .display {
            background: #1a1a2e;
            border-radius: clamp(15px, 4vw, 25px);
            padding: clamp(15px, 4vw, 25px);
            margin-bottom: clamp(15px, 4vw, 20px);
            text-align: right;
            min-height: clamp(100px, 25vw, 140px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            word-wrap: break-word;
            word-break: break-all;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
        }

        .previous-operand {
            color: rgba(255, 255, 255, 0.75);
            font-size: clamp(1rem, 5vw, 1.5rem);
            min-height: clamp(1.5rem, 5vw, 2rem);
        }

        .current-operand {
            color: white;
            font-size: clamp(2rem, 10vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(8px, 2vw, 12px);
            margin-bottom: clamp(15px, 4vw, 20px);
        }

        .btn {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: clamp(10px, 3vw, 20px);
            font-size: clamp(1.2rem, 6vw, 2rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #1a1a2e;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-operator {
            background: #f0f0f0;
            color: #764ba2;
            font-weight: 700;
        }

        .btn-equals {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: span 2;
            aspect-ratio: auto;
        }

        .btn-clear {
            background: #ff4757;
            color: white;
        }

        .btn-delete {
            background: #ffa502;
            color: white;
        }

        .btn-zero {
            grid-column: span 2;
            aspect-ratio: auto;
        }

        .footer {
            text-align: center;
            padding: clamp(12px, 3vw, 15px) 0 0 0;
            border-top: 2px solid rgba(102, 126, 234, 0.2);
            margin-top: clamp(8px, 2vw, 10px);
        }

        .footer-text {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            font-weight: 500;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .footer-text span {
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            font-weight: 400;
            display: block;
            margin-top: 4px;
            -webkit-text-fill-color: #888;
            background: none;
            color: #888;
        }

        /* Responsive adjustments for very small screens */
        @media (max-width: 320px) {
            .btn {
                font-size: 1rem;
            }
            
            .current-operand {
                font-size: 1.8rem;
            }
        }

        /* Landscape orientation on phones */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 5px;
            }
            
            .calculator-container {
                max-width: 600px;
            }
            
            .display {
                min-height: 70px;
                padding: 10px;
            }
            
            .btn {
                aspect-ratio: 1 / 0.8;
            }
        }

        /* Tablet optimization */
        @media (min-width: 768px) and (max-width: 1024px) {
            .calculator-container {
                max-width: 500px;
            }
            
            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            }
            
            .btn-operator:hover {
                background: #e0e0e0;
            }
            
            .btn-equals:hover {
                opacity: 0.9;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="display">
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
        </div>
        
        <div class="buttons-grid">
            <button class="btn btn-clear" onclick="clearDisplay()">C</button>
            <button class="btn btn-delete" onclick="deleteLast()">⌫</button>
            <button class="btn btn-operator" onclick="appendOperator('%')">%</button>
            <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>
            
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="appendOperator('*')">×</button>
            
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('-')">−</button>
            
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>
            
            <button class="btn btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendDot()">.</button>
            <button class="btn btn-equals" onclick="calculate()">=</button>
        </div>
        
        <div class="footer">
            <div class="footer-text">
                Made By Bishwa
                <span>© 2024 Smart Calculator</span>
            </div>
        </div>
    </div>

    <script>
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;

        const currentOperandElement = document.getElementById('current-operand');
        const previousOperandElement = document.getElementById('previous-operand');

        function updateDisplay() {
            currentOperandElement.innerText = currentOperand;
            if (operation != null) {
                previousOperandElement.innerText = `${previousOperand} ${operation}`;
            } else {
                previousOperandElement.innerText = previousOperand;
            }
        }

        function appendNumber(number) {
            if (number === '0' && currentOperand === '0') return;
            if (currentOperand === '0') {
                currentOperand = number;
            } else {
                currentOperand += number;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentOperand === '') return;
            if (previousOperand !== '') {
                calculate();
            }
            operation = op;
            previousOperand = currentOperand;
            currentOperand = '';
            updateDisplay();
        }

        function appendDot() {
            if (!currentOperand.includes('.')) {
                currentOperand += '.';
                updateDisplay();
            }
        }

        function clearDisplay() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
            updateDisplay();
        }

        function deleteLast() {
            currentOperand = currentOperand.slice(0, -1);
            if (currentOperand === '') {
                currentOperand = '0';
            }
            updateDisplay();
        }

        function calculate() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            
            if (isNaN(prev) || isNaN(current)) return;
            
            switch (operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '*':
                    computation = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        alert('Cannot divide by zero!');
                        clearDisplay();
                        return;
                    }
                    computation = prev / current;
                    break;
                case '%':
                    computation = prev % current;
                    break;
                default:
                    return;
            }
            
            currentOperand = computation.toString();
            operation = undefined;
            previousOperand = '';
            updateDisplay();
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendDot();
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                if (e.key === '*') appendOperator('*');
                else if (e.key === '/') appendOperator('/');
                else appendOperator(e.key);
            }
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearDisplay();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === '%') appendOperator('%');
        });
    </script>
</body>
</html>
